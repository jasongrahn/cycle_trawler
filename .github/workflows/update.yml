name: weekly-update

on:
  schedule:
    - cron: "0 12 * * 1"   # Monday noon UTC
  workflow_dispatch:         # manual "Run workflow" button

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get install -y libv8-dev

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-renv@v2

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Fetch RapidAPI (Adapter A)
        run: Rscript R/fetch_rapidapi.R
        continue-on-error: true   # fail-soft: one bad source ≠ dead site

      - name: Fetch Reddit (Adapter B1)
        run: Rscript R/fetch_reddit.R
        continue-on-error: true

      - name: Fetch Slickdeals (Adapter B2)
        run: Rscript R/fetch_slickdeals.R
        continue-on-error: true

      - name: Build site data
        run: Rscript R/build_site_data.R

      - name: Commit data
        run: |
          git config user.name  "ww-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "data: weekly update [skip ci]"
          git pull --rebase
          git push

      - name: Render site
        run: quarto render

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
